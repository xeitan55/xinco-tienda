<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout — XINCO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/xinco.css"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{surface:"#f9f9f9","surface-container-lowest":"#ffffff","surface-container-low":"#f4f3f3","surface-container":"#eeeeee","on-surface":"#1a1c1c","on-surface-variant":"#4c4546","outline-variant":"#cfc4c5",primary:"#000000","on-primary":"#ffffff",secondary:"#4500d1","secondary-container":"#5d22ff",error:"#ba1a1a",background:"#f9f9f9"},borderRadius:{DEFAULT:"0px",lg:"0px",xl:"0px",full:"9999px"}}}}</script>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- HEADER -->
<header class="bg-background border-b-[3px] border-primary px-6 md:px-12 py-4">
  <div class="max-w-[1440px] mx-auto flex justify-between items-center">
    <a href="index.html" style="font-family:Montserrat;font-size:32px;font-weight:900;letter-spacing:-0.04em;" class="text-primary">XINCO</a>
    <div class="flex items-center gap-2 font-label-caps text-label-caps text-on-surface-variant">
      <span class="material-symbols-outlined text-[18px]">lock</span> CHECKOUT SEGURO
    </div>
  </div>
</header>

<div class="max-w-[1440px] mx-auto px-6 md:px-12 py-12">
  <h1 style="font-family:Montserrat;font-size:clamp(28px,5vw,56px);font-weight:900;letter-spacing:-0.03em;" class="text-primary uppercase mb-8 border-b-[3px] border-primary pb-6">FINALIZAR COMPRA</h1>

  <div id="empty-cart-msg" class="hidden text-center py-16">
    <span class="material-symbols-outlined text-[64px] text-outline-variant">shopping_bag</span>
    <p class="font-label-caps text-label-caps text-on-surface-variant mt-4">TU CARRITO ESTÁ VACÍO</p>
    <a href="catalog.html" class="btn-primary mt-6 inline-flex">IR AL CATÁLOGO</a>
  </div>

  <div id="checkout-content" class="flex flex-col lg:flex-row gap-12">
    <!-- Form -->
    <div class="flex-1">
      <!-- Steps -->
      <div class="flex gap-0 mb-10 border-[3px] border-primary">
        <div id="step-1-tab" class="flex-1 flex items-center justify-center gap-2 py-3 bg-primary text-on-primary font-label-caps text-label-caps">
          <span class="w-6 h-6 flex items-center justify-center border-2 border-white text-[11px]">1</span> DATOS
        </div>
        <div id="step-2-tab" class="flex-1 flex items-center justify-center gap-2 py-3 bg-surface font-label-caps text-label-caps border-l-[3px] border-primary">
          <span class="w-6 h-6 flex items-center justify-center border-2 border-primary text-[11px]">2</span> ENVÍO
        </div>
        <div id="step-3-tab" class="flex-1 flex items-center justify-center gap-2 py-3 bg-surface font-label-caps text-label-caps border-l-[3px] border-primary">
          <span class="w-6 h-6 flex items-center justify-center border-2 border-primary text-[11px]">3</span> PAGO
        </div>
      </div>

      <!-- Step 1 -->
      <div id="checkout-step-1">
        <h2 class="font-label-caps text-label-caps text-primary mb-5">DATOS PERSONALES</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
          <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">NOMBRE *</label><input id="co-nombre" class="input-field" placeholder="Juan"/></div>
          <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">APELLIDO *</label><input id="co-apellido" class="input-field" placeholder="Pérez"/></div>
          <div class="md:col-span-2"><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">EMAIL *</label><input id="co-email" class="input-field" type="email" placeholder="juan@email.com"/></div>
          <div class="md:col-span-2"><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">TELÉFONO</label><input class="input-field" placeholder="+54 9 11 0000-0000"/></div>
          <div class="md:col-span-2"><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">DIRECCIÓN *</label><input id="co-dir" class="input-field" placeholder="Av. Corrientes 1234"/></div>
          <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">CIUDAD *</label><input id="co-ciudad" class="input-field" placeholder="Mar del Plata"/></div>
          <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">CÓDIGO POSTAL</label><input class="input-field" placeholder="7600"/></div>
          <div class="md:col-span-2"><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">PROVINCIA</label>
            <select class="input-field"><option>Buenos Aires</option><option>CABA</option><option>Córdoba</option><option>Santa Fe</option><option>Mendoza</option><option>Otro</option></select>
          </div>
        </div>
        <button class="btn-primary" onclick="checkoutStep(2)">CONTINUAR <span class="material-symbols-outlined text-[16px]">arrow_forward</span></button>
      </div>

      <!-- Step 2 -->
      <div id="checkout-step-2" class="hidden">
        <h2 class="font-label-caps text-label-caps text-primary mb-5">MÉTODO DE ENVÍO</h2>
        <div class="space-y-3 mb-8">
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="shipping" value="standard" checked class="text-primary"/><div class="flex-1"><div class="font-label-caps text-label-caps text-primary">ENVÍO ESTÁNDAR (5-7 DÍAS)</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">Correo Argentino / OCA</div></div><span class="font-label-caps text-label-caps text-secondary-container">GRATIS</span></label>
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="shipping" value="express" class="text-primary"/><div class="flex-1"><div class="font-label-caps text-label-caps text-primary">ENVÍO EXPRESS (1-2 DÍAS)</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">Andreani / DHL</div></div><span class="font-label-caps text-label-caps text-primary">$2.800</span></label>
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="shipping" value="pickup" class="text-primary"/><div class="flex-1"><div class="font-label-caps text-label-caps text-primary">RETIRO EN LOCAL</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">Mar del Plata — coordinar por Instagram</div></div><span class="font-label-caps text-label-caps text-secondary-container">GRATIS</span></label>
        </div>
        <div class="flex gap-4">
          <button class="btn-outline" onclick="checkoutStep(1)"><span class="material-symbols-outlined text-[16px]">arrow_back</span> VOLVER</button>
          <button class="btn-primary" onclick="checkoutStep(3)">CONTINUAR <span class="material-symbols-outlined text-[16px]">arrow_forward</span></button>
        </div>
      </div>

      <!-- Step 3 -->
      <div id="checkout-step-3" class="hidden">
        <h2 class="font-label-caps text-label-caps text-primary mb-5">MÉTODO DE PAGO</h2>
        <div class="space-y-3 mb-6">
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="payment" value="mercadopago" checked class="text-primary" onclick="togglePaymentForm('mp')"/><span class="material-symbols-outlined">account_balance_wallet</span><div><div class="font-label-caps text-label-caps text-primary">MERCADO PAGO</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">Tarjeta, efectivo, cuotas</div></div></label>
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="payment" value="card" class="text-primary" onclick="togglePaymentForm('card')"/><span class="material-symbols-outlined">credit_card</span><div><div class="font-label-caps text-label-caps text-primary">TARJETA CRÉDITO / DÉBITO</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">Hasta 12 cuotas sin interés</div></div></label>
          <label class="flex items-center gap-4 p-4 border-[3px] border-primary cursor-pointer hover:bg-surface-container-low"><input type="radio" name="payment" value="transfer" class="text-primary" onclick="togglePaymentForm('transfer')"/><span class="material-symbols-outlined">swap_horiz</span><div><div class="font-label-caps text-label-caps text-primary">TRANSFERENCIA BANCARIA</div><div class="text-sm text-on-surface-variant" style="font-family:Inter;">10% de descuento adicional</div></div></label>
        </div>
        <!-- Card form -->
        <div id="card-form" class="hidden border-[3px] border-primary p-5 mb-5">
          <div class="grid grid-cols-1 gap-4">
            <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">NÚMERO DE TARJETA</label><input class="input-field" placeholder="0000 0000 0000 0000" maxlength="19"/></div>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">VENCIMIENTO</label><input class="input-field" placeholder="MM/AA" maxlength="5"/></div>
              <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">CVV</label><input class="input-field" placeholder="000" maxlength="3" type="password"/></div>
            </div>
            <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">NOMBRE EN LA TARJETA</label><input class="input-field" placeholder="JUAN PEREZ"/></div>
          </div>
        </div>
        <!-- Transfer info -->
        <div id="transfer-info" class="hidden border-[3px] border-primary p-5 mb-5 bg-surface-container-low">
          <p class="font-label-caps text-label-caps text-primary mb-3">DATOS PARA TRANSFERIR</p>
          <div class="space-y-2 font-label-caps text-label-caps">
            <div class="flex justify-between"><span class="text-on-surface-variant">BANCO</span><span>Banco Galicia</span></div>
            <div class="flex justify-between"><span class="text-on-surface-variant">TITULAR</span><span>XINCO S.R.L.</span></div>
            <div class="flex justify-between"><span class="text-on-surface-variant">ALIAS</span><span>XINCO.TIENDA</span></div>
          </div>
        </div>
        <div class="flex gap-4">
          <button class="btn-outline" onclick="checkoutStep(2)"><span class="material-symbols-outlined text-[16px]">arrow_back</span> VOLVER</button>
          <button class="btn-violet flex-1 justify-center py-4" onclick="placeOrder()">CONFIRMAR PEDIDO <span class="material-symbols-outlined">check</span></button>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <aside class="lg:w-80 shrink-0">
      <div class="border-[3px] border-primary p-6 md:sticky md:top-24">
        <h3 class="font-label-caps text-label-caps text-primary mb-5 pb-3 border-b-[3px] border-primary">TU PEDIDO</h3>
        <div id="checkout-items" class="space-y-4 mb-5"></div>
        <div class="space-y-2 pt-4 border-t-[3px] border-primary">
          <div class="flex justify-between font-label-caps text-label-caps"><span class="text-on-surface-variant">SUBTOTAL</span><span id="checkout-subtotal">$0</span></div>
          <div class="flex justify-between font-label-caps text-label-caps"><span class="text-on-surface-variant">ENVÍO</span><span>GRATIS</span></div>
          <div class="flex justify-between font-label-caps text-[15px] font-bold text-primary pt-3 border-t-[3px] border-primary"><span>TOTAL</span><span id="checkout-total">$0</span></div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script type="module">
import { initStore, store, placeOrder as storePlaceOrder, cartTotal, fmtPrice } from './js/store.js';
import { showToast } from './js/ui.js';

window.showToast = showToast;
let currentStep = 1;

window.checkoutStep = (n) => {
  [1,2,3].forEach(i => {
    document.getElementById(`checkout-step-${i}`).classList.toggle('hidden', i!==n);
    const tab = document.getElementById(`step-${i}-tab`);
    tab.classList.toggle('bg-primary', i<=n); tab.classList.toggle('text-on-primary', i<=n);
    tab.classList.toggle('bg-surface', i>n);
  });
  currentStep = n;
};

window.togglePaymentForm = (type) => {
  document.getElementById('card-form').classList.toggle('hidden', type!=='card');
  document.getElementById('transfer-info').classList.toggle('hidden', type!=='transfer');
};

window.placeOrder = async () => {
  if (store.cart.length === 0) { showToast('Tu carrito está vacío'); return; }
  const nombre = document.getElementById('co-nombre')?.value.trim();
  const email = document.getElementById('co-email')?.value.trim();
  if (!nombre || !email) { showToast('Completá nombre y email ❌'); checkoutStep(1); return; }
  const btn = document.querySelector('#checkout-step-3 .btn-violet');
  if (btn) { btn.textContent = 'PROCESANDO...'; btn.disabled = true; }
  try {
    const orderId = await storePlaceOrder({
      customer: nombre + ' ' + (document.getElementById('co-apellido')?.value||''),
      email, date: new Date().toLocaleDateString('es-AR'),
      total: cartTotal(), status: 'pending',
      items: store.cart.map(i=>({name:i.name, qty:i.qty, price:i.price})),
    });
    location.href = `order-confirm.html?id=${orderId}`;
  } catch(e) {
    showToast('Error al procesar el pedido ❌');
    if (btn) { btn.textContent = 'CONFIRMAR PEDIDO'; btn.disabled = false; }
  }
};

function renderCheckout() {
  const el = document.getElementById('checkout-items');
  if (store.cart.length === 0) {
    document.getElementById('empty-cart-msg').classList.remove('hidden');
    document.getElementById('checkout-content').classList.add('hidden');
    return;
  }
  el.innerHTML = store.cart.map(i=>`
    <div class="flex gap-3">
      <img src="${i.img}" class="w-14 h-16 object-cover border-2 border-primary shrink-0"/>
      <div class="flex-1 min-w-0">
        <div class="font-label-caps text-[11px] text-primary truncate">${i.name}</div>
        <div class="font-label-caps text-[10px] text-on-surface-variant">${i.size} / ×${i.qty}</div>
      </div>
      <div class="font-label-caps text-[11px] text-primary">${fmtPrice(i.price*i.qty)}</div>
    </div>`).join('');
  const sub = cartTotal();
  document.getElementById('checkout-subtotal').textContent = fmtPrice(sub);
  document.getElementById('checkout-total').textContent = fmtPrice(sub >= 95000 ? sub : sub+2800);
}

async function boot() {
  await initStore();
  renderCheckout();
}
boot();
</script>
</body>
</html>
