<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Cuenta — XINCO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/xinco.css"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{surface:"#f9f9f9","surface-container-lowest":"#ffffff","surface-container-low":"#f4f3f3","surface-container":"#eeeeee","on-surface":"#1a1c1c","on-surface-variant":"#4c4546","outline-variant":"#cfc4c5",primary:"#000000","on-primary":"#ffffff",secondary:"#4500d1","secondary-container":"#5d22ff",background:"#f9f9f9"},borderRadius:{DEFAULT:"0px",lg:"0px",xl:"0px",full:"9999px"}}}}</script>
</head>
<body>
<div id="toast" class="toast"></div>
<header class="bg-background border-b-[3px] border-primary px-6 md:px-12 py-4 sticky top-0 z-50">
  <div class="max-w-[1440px] mx-auto flex justify-between items-center">
    <a href="index.html" style="font-family:Montserrat;font-size:clamp(20px,3vw,32px);font-weight:900;letter-spacing:-0.04em;" class="text-primary">XINCO</a>
    <a href="catalog.html" class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary">CATÁLOGO</a>
  </div>
</header>

<div class="max-w-[1440px] mx-auto px-6 md:px-12 py-12">
  <h1 style="font-family:Montserrat;font-size:clamp(28px,5vw,48px);font-weight:900;letter-spacing:-0.03em;" class="text-primary uppercase mb-8 border-b-[3px] border-primary pb-6">MI CUENTA</h1>
  <div class="flex flex-col md:flex-row gap-8">
    <aside class="w-full md:w-64 shrink-0">
      <div class="border-[3px] border-primary overflow-hidden md:sticky md:top-24">
        <div class="bg-primary text-on-primary p-4">
          <div class="w-14 h-14 border-2 border-white flex items-center justify-center mb-2">
            <span class="material-symbols-outlined text-[36px]">account_circle</span>
          </div>
          <div id="account-name" class="font-label-caps text-label-caps">CARGANDO...</div>
          <div id="account-email-disp" class="text-white/60 text-[10px] mt-1" style="font-family:'JetBrains Mono',monospace;"></div>
        </div>
        <nav>
          <button class="tab-btn active w-full text-left border-b-[2px] border-primary" id="acc-tab-orders" onclick="showTab('orders')">MIS PEDIDOS</button>
          <button class="tab-btn w-full text-left border-b-[2px] border-primary" id="acc-tab-profile" onclick="showTab('profile')">MI PERFIL</button>
          <button class="tab-btn w-full text-left" id="acc-tab-addresses" onclick="showTab('addresses')">DIRECCIONES</button>
        </nav>
      </div>
    </aside>
    <main class="flex-1">
      <!-- Orders -->
      <div id="acc-content-orders">
        <div id="orders-loading" class="xinco-loader"></div>
        <div id="orders-empty" class="hidden text-center py-16 border-[3px] border-primary">
          <span class="material-symbols-outlined text-[64px] text-outline-variant">package_2</span>
          <p class="font-label-caps text-label-caps text-on-surface-variant mt-4">NO TENÉS PEDIDOS AÚN</p>
          <a href="catalog.html" class="btn-primary mt-6 inline-flex">EMPEZAR A COMPRAR</a>
        </div>
        <div id="orders-list" class="hidden space-y-4"></div>
      </div>
      <!-- Profile -->
      <div id="acc-content-profile" class="hidden">
        <div class="border-[3px] border-primary p-6">
          <h2 class="font-label-caps text-label-caps text-primary mb-5">DATOS PERSONALES</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">EMAIL</label><input id="acc-email" class="input-field" type="email" disabled style="opacity:0.6;"/></div>
            <div><label class="font-label-caps text-label-caps text-on-surface-variant block mb-2">UID</label><input id="acc-uid" class="input-field" disabled style="opacity:0.6;font-size:10px;"/></div>
          </div>
          <button class="btn-outline mt-5" onclick="doLogout()"><span class="material-symbols-outlined text-[16px]">logout</span> CERRAR SESIÓN</button>
        </div>
      </div>
      <!-- Addresses -->
      <div id="acc-content-addresses" class="hidden">
        <div class="border-[3px] border-primary p-6">
          <h2 class="font-label-caps text-label-caps text-primary mb-5">MIS DIRECCIONES</h2>
          <p class="font-body-md text-on-surface-variant">Próximamente podrás guardar tus direcciones de envío.</p>
        </div>
      </div>
    </main>
  </div>
  <div class="mt-8 pt-6 border-t-[3px] border-primary text-right">
    <button class="btn-outline" onclick="doLogout()"><span class="material-symbols-outlined text-[16px]">logout</span> CERRAR SESIÓN</button>
  </div>
</div>

<script type="module">
import { initStore, store, onStoreChange, fmtPrice } from './js/store.js';
import { doLogout } from './js/auth.js';
import { requireAuth, showToast } from './js/ui.js';
import { showToast as toast } from './js/ui.js';

window.doLogout = doLogout;
window.showToast = toast;

window.showTab = (tab) => {
  ['orders','profile','addresses'].forEach(t => {
    document.getElementById('acc-content-'+t).classList.toggle('hidden', t!==tab);
    const btn = document.getElementById('acc-tab-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
};

function renderOrders() {
  const loading = document.getElementById('orders-loading');
  const empty = document.getElementById('orders-empty');
  const list = document.getElementById('orders-list');
  if (loading) loading.classList.add('hidden');
  const userOrders = store.orders.filter(o => store.user && o.email === store.user.email);
  if (userOrders.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  list.classList.remove('hidden');
  list.innerHTML = userOrders.map(o=>`
    <div class="border-[3px] border-primary p-4">
      <div class="flex justify-between items-start mb-3">
        <div><span class="font-label-caps text-label-caps text-primary">#${o.id}</span><span class="font-label-caps text-[10px] text-on-surface-variant ml-3">${o.date}</span></div>
        <span class="badge ${o.status==='pending'?'badge-black':o.status==='shipped'?'badge-outline':'badge-violet'}">${o.status.toUpperCase()}</span>
      </div>
      <div class="font-body-md text-on-surface-variant text-sm">${o.items?.map(i=>i.name).join(', ')}</div>
      <div class="font-label-caps text-label-caps text-primary mt-2">${fmtPrice(o.total)}</div>
    </div>`).join('');
}

async function boot() {
  await initStore();
  if (!store.user) { location.href = 'login.html'; return; }
  document.getElementById('account-name').textContent = (store.user.displayName || store.user.email.split('@')[0]).toUpperCase();
  document.getElementById('account-email-disp').textContent = store.user.email;
  document.getElementById('acc-email').value = store.user.email;
  document.getElementById('acc-uid').value = store.user.uid;
  renderOrders();
}

onStoreChange(e => { if(e==='orders') renderOrders(); });
boot();
</script>
</body>
</html>
