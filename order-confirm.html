<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedido Confirmado — XINCO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/xinco.css"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#000000","on-primary":"#ffffff",secondary:"#4500d1","secondary-container":"#5d22ff","on-surface-variant":"#4c4546",background:"#f9f9f9"},borderRadius:{DEFAULT:"0px",lg:"0px",xl:"0px",full:"9999px"}}}}</script>
</head>
<body>
<div class="min-h-screen flex items-center justify-center px-6 py-16 bg-background">
  <div class="max-w-lg w-full text-center">
    <div class="w-20 h-20 bg-primary flex items-center justify-center mx-auto mb-6">
      <span class="material-symbols-outlined text-white text-[48px]">check</span>
    </div>
    <h1 style="font-family:Montserrat;font-size:clamp(28px,5vw,56px);font-weight:900;letter-spacing:-0.03em;" class="text-primary uppercase mb-4">¡PEDIDO<br>CONFIRMADO!</h1>
    <p class="font-body-md text-on-surface-variant mb-3">Tu número de pedido es:</p>
    <div class="inline-block border-[3px] border-secondary-container px-8 py-4 mb-6">
      <span id="order-number" class="font-label-caps text-label-caps text-secondary-container text-lg tracking-widest"></span>
    </div>
    <p class="font-body-md text-on-surface-variant mb-8">Recibirás un email de confirmación con los detalles y el tracking de envío.</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="account.html" class="btn-primary">MIS PEDIDOS</a>
      <a href="catalog.html" class="btn-outline">SEGUIR COMPRANDO</a>
    </div>
  </div>
</div>
<script>
const id = new URLSearchParams(location.search).get('id');
document.getElementById('order-number').textContent = '#' + (id || 'XINCO-' + Date.now().toString(36).toUpperCase());
</script>
</body>
</html>
